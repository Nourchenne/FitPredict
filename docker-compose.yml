services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fitpredict_backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: fitpredict_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/app/artifacts
    volumes:
      - ./mlruns:/app/artifacts
    command: >
      mlflow server  --backend-store-uri sqlite:///mlflow.db  --default-artifact-root /app/artifacts  --host 0.0.0.0

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fitpredict_frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

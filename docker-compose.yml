services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fitpredict_backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - LLM_TIMEOUT_SECONDS=60
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./rag_sources:/app/rag_sources
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: fitpredict_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////app/artifacts/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/app/artifacts
    volumes:
      - ./mlruns:/app/artifacts
    command: >
      mlflow server --backend-store-uri sqlite:////app/artifacts/mlflow.db --default-artifact-root /app/artifacts --host 0.0.0.0

  ollama:
    image: ollama/ollama:latest
    container_name: fitpredict_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fitpredict_frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ollama_data:
